<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>庄月清 - 简历</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --primary: #2563eb;
      --line: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 24px;
    }

    .resume {
      max-width: 900px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .header {
      border-bottom: 2px solid var(--line);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 1px;
    }

    .contact {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .dot {
      color: #9ca3af;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
      color: var(--primary);
    }

    .section {
      margin-bottom: 24px;
    }

    .edu-item {
      margin-bottom: 14px;
      padding-left: 12px;
      border-left: 3px solid #dbeafe;
    }

    .school-line {
      font-weight: 600;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
    }

    .research {
      margin: 0;
      padding-left: 20px;
    }

    .research li {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <main class="resume">
    <header class="header">
      <h1>庄月清</h1>
      <div class="contact">
        <span>邮箱：yqingzhuang@foxmail.com</span>
      </div>
    </header>

    <section class="section">
      <h2>教育、技术背景</h2>

      <article class="edu-item">
        <div class="school-line">北京大学（北京） 理学硕士，计算机应用技术（图像处理方向）</div>
        <div class="meta">2016.09 – 2019.07</div>
      </article>

      <article class="edu-item">
        <div class="school-line">华中科技大学（武汉） 工学学士，通信工程</div>
        <div class="meta">2012.09 – 2016.07</div>
      </article>
    </section>

  </main>
</body>
</html>
